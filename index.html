<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Economy v3</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    height:100vh;
}

.sidebar{
    width:320px;
    background:#1c1c1c;
    padding:15px;
    overflow:auto;
    border-right:2px solid #333;
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

canvas{
    image-rendering: pixelated;
    width:768px;
    height:768px;
    border:2px solid white;
    background:white;
}

button{
    padding:8px;
    margin:4px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.colorBtn{
    width:36px;
    height:36px;
    border:2px solid white;
}

.shop-item{
    background:#222;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="sidebar">

<h1>Pixel Economy</h1>

<h2>Coins: <span id="coins">0</span></h2>

<h3>Toolok</h3>

<button onclick="tool='draw'">Ceruza</button>
<button onclick="tool='erase'">Radír</button>

<div id="extraTools"></div>

<h3>Színek</h3>
<div id="palette"></div>

<h3>Shop</h3>
<div id="shop"></div>

<button onclick="sellArtwork()">Artwork Eladás</button>
<button onclick="clearCanvas()">Canvas Törlés</button>

</div>

<div class="main">
<canvas id="canvas" width="128" height="128"></canvas>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const SIZE = 128;

let coins = 0;
let tool = "draw";
let currentColor = "#000000";

const pixels = [];

for(let y=0;y<SIZE;y++){
    pixels[y] = [];
    for(let x=0;x<SIZE;x++){
        pixels[y][x] = "#ffffff";
    }
}

const colors = [
"#000000","#ff0000","#00ff00","#0000ff","#ffff00",
"#ff00ff","#00ffff","#ffa500","#800080","#ffc0cb",
"#8b4513","#808080","#90ee90","#add8e6","#ffd700",
"#dc143c","#00ced1","#4b0082","#7fff00","#ff1493",
"#a52a2a","#5f9ea0","#2e8b57","#ff69b4","#6a5acd",
"#20b2aa","#ff6347","#4682b4","#32cd32","#708090",
"#9932cc","#ff4500","#191970","#b8860b","#adff2f",
"#c71585","#00fa9a","#483d8b","#40e0d0","#f4a460"
];

const unlockedColors = ["#000000"];

const colorPrices = {};

colors.forEach((c,i)=>{
    colorPrices[c] = (i+1) * 250;
});

let fillUnlocked = false;
let squareUnlocked = false;

function updateCoins(){
    document.getElementById("coins").innerText = coins;
}

function renderPalette(){

    const palette = document.getElementById("palette");

    palette.innerHTML = "";

    unlockedColors.forEach(color=>{

        const btn = document.createElement("button");

        btn.className = "colorBtn";

        btn.style.background = color;

        btn.onclick = ()=>{
            currentColor = color;
        };

        palette.appendChild(btn);
    });
}

function renderExtraTools(){

    const extra = document.getElementById("extraTools");

    extra.innerHTML = "";

    if(squareUnlocked){

        const btn = document.createElement("button");

        btn.innerText = "Négyzet Tool";

        btn.onclick = ()=>{
            tool = "square";
        };

        extra.appendChild(btn);
    }

    if(fillUnlocked){

        const btn = document.createElement("button");

        btn.innerText = "Fill Tool";

        btn.onclick = ()=>{
            fillCanvas(currentColor);
        };

        extra.appendChild(btn);
    }
}

function renderShop(){

    const shop = document.getElementById("shop");

    shop.innerHTML = "";

    colors.forEach(color=>{

        if(!unlockedColors.includes(color)){

            const div = document.createElement("div");

            div.className = "shop-item";

            div.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:30px;height:30px;background:${color};border:1px solid white;"></div>
                <div>${colorPrices[color]} coin</div>
            </div>
            `;

            const btn = document.createElement("button");

            btn.innerText = "Megvesz";

            btn.onclick = ()=>buyColor(color);

            div.appendChild(btn);

            shop.appendChild(div);
        }
    });

    if(!squareUnlocked){

        const div = document.createElement("div");

        div.className = "shop-item";

        div.innerHTML = "<h4>Négyzet Tool - 3000 coin</h4>";

        const btn = document.createElement("button");

        btn.innerText = "Megvesz";

        btn.onclick = ()=>{

            if(coins >= 3000){

                coins -= 3000;

                squareUnlocked = true;

                updateCoins();

                renderExtraTools();

                renderShop();
            }
        };

        div.appendChild(btn);

        shop.appendChild(div);
    }

    if(!fillUnlocked){

        const div = document.createElement("div");

        div.className = "shop-item";

        div.innerHTML = "<h4>Fill Tool - 5000 coin</h4>";

        const btn = document.createElement("button");

        btn.innerText = "Megvesz";

        btn.onclick = ()=>{

            if(coins >= 5000){

                coins -= 5000;

                fillUnlocked = true;

                updateCoins();

                renderExtraTools();

                renderShop();
            }
        };

        div.appendChild(btn);

        shop.appendChild(div);
    }
}

function buyColor(color){

    const price = colorPrices[color];

    if(coins >= price){

        coins -= price;

        unlockedColors.push(color);

        updateCoins();

        renderPalette();

        renderShop();
    }
}

function drawPixel(x,y,color,giveCoins=true){

    if(x < 0 || y < 0 || x >= SIZE || y >= SIZE) return;

    if(giveCoins){

        if(pixels[y][x] === "#ffffff"){
            coins += 1;
        }
    }

    pixels[y][x] = color;

    ctx.fillStyle = color;

    ctx.fillRect(x,y,1,1);
}

function redrawCanvas(){

    for(let y=0;y<SIZE;y++){

        for(let x=0;x<SIZE;x++){

            ctx.fillStyle = pixels[y][x];

            ctx.fillRect(x,y,1,1);
        }
    }
}

let drawing = false;

canvas.addEventListener("mousedown",(e)=>{

    drawing = true;

    paint(e);
});

canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mouseleave",()=>drawing=false);
canvas.addEventListener("mousemove",paint);

function getPos(e){

    const rect = canvas.getBoundingClientRect();

    return {
        x: Math.floor((e.clientX - rect.left)/(rect.width/SIZE)),
        y: Math.floor((e.clientY - rect.top)/(rect.height/SIZE))
    };
}

function paint(e){

    if(!drawing) return;

    const pos = getPos(e);

    const x = pos.x;
    const y = pos.y;

    if(tool === "draw"){

        drawPixel(x,y,currentColor,true);
    }

    if(tool === "erase"){

        drawPixel(x,y,"#ffffff",false);
    }

    if(tool === "square"){

        for(let yy=y;yy<y+8;yy++){

            for(let xx=x;xx<x+8;xx++){

                drawPixel(xx,yy,currentColor,true);
            }
        }
    }

    updateCoins();

    redrawCanvas();
}

function fillCanvas(color){

    for(let y=0;y<SIZE;y++){

        for(let x=0;x<SIZE;x++){

            pixels[y][x] = color;
        }
    }

    redrawCanvas();
}

function clearCanvas(){

    for(let y=0;y<SIZE;y++){

        for(let x=0;x<SIZE;x++){

            pixels[y][x] = "#ffffff";
        }
    }

    redrawCanvas();
}

function sellArtwork(){

    let pixelCount = 0;

    const usedColors = new Set();

    for(let y=0;y<SIZE;y++){

        for(let x=0;x<SIZE;x++){

            if(pixels[y][x] !== "#ffffff"){

                pixelCount++;

                usedColors.add(pixels[y][x]);
            }
        }
    }

    const value =
        Math.floor(pixelCount * 0.5) +
        (usedColors.size * 200);

    alert("Artwork eladva! +" + value + " coin");

    coins += value;

    updateCoins();

    clearCanvas();
}

renderPalette();
renderShop();
renderExtraTools();
updateCoins();
redrawCanvas();

</script>

</body>
</html>
